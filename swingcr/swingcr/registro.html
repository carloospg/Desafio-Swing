<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swing CR - Registrar Evento</title>
  </head>
  <body>
    <!-- El header se rellena dinamicamente por headerFooter.js -->
    <header></header>

    <main>
      <section id="registro">
        <!-- main.js cambia este titulo a "EDITAR EVENTO" cuando viene de un boton Editar -->
        <h2>REGISTRAR EVENTO</h2>

        <!-- Tabs para elegir si se va a registrar una CLASE o una ACTIVIDAD.
             Al hacer click, main.js muestra el bloque de campos correspondiente
             y oculta el otro. En modo edicion estos tabs quedan bloqueados. -->
        <div class="tabs-form" role="tablist" aria-label="Tipo de evento">
          <button
            class="tab-form-btn activo"
            data-tipo="clase"
            role="tab"
            aria-selected="true"
            aria-controls="campos-clase"
          >
            CLASE
          </button>
          <button
            class="tab-form-btn"
            data-tipo="actividad"
            role="tab"
            aria-selected="false"
            aria-controls="campos-actividad"
          >
            ACTIVIDAD
          </button>
        </div>

        <!-- novalidate desactiva la validacion nativa del navegador.
             La validacion la hacemos nosotros en main.js para tener mas control
             sobre los mensajes de error. -->
        <form id="form-evento" class="formulario" novalidate>
          <!-- ── Campos comunes a CLASE y ACTIVIDAD ── -->

          <div class="form-grupo">
            <label for="nombre-evento">Nombre*</label>
            <input
              type="text"
              id="nombre-evento"
              name="nombre-evento"
              placeholder="Nombre del evento"
            />
          </div>

          <div class="form-grupo">
            <label for="dia-evento">Dia*</label>
            <select id="dia-evento" name="dia-evento">
              <option value="viernes">Viernes</option>
              <option value="sabado">Sabado</option>
              <option value="domingo">Domingo</option>
            </select>
          </div>

          <!-- Los selects de hora se dejan vacios en el HTML.
               main.js los rellena dinamicamente con las horas validas segun el dia elegido.
               Cuando cambia el dia, los selects se regeneran con el nuevo rango. -->
          <div class="form-grupo form-grupo--doble">
            <div>
              <label for="hora-inicio">Hora de inicio*</label>
              <select id="hora-inicio" name="hora-inicio"></select>
            </div>
            <div>
              <label for="hora-fin">Hora de fin*</label>
              <select id="hora-fin" name="hora-fin"></select>
            </div>
          </div>

          <div class="form-grupo">
            <label for="estilo-evento">Estilo*</label>
            <select id="estilo-evento" name="estilo-evento">
              <option value="lindy-hop">Lindy Hop</option>
              <option value="shag">Shag</option>
              <option value="solo-jazz">Solo Jazz</option>
            </select>
          </div>

          <!-- ── Campos exclusivos de CLASE ──
               Visible por defecto. main.js lo oculta si se cambia al tab ACTIVIDAD. -->
          <div id="campos-clase" class="campos-tipo">
            <div class="form-grupo">
              <label for="sala-clase">Sala*</label>
              <select id="sala-clase" name="sala-clase">
                <option value="be-hopper">Sala Be Hopper</option>
                <option value="new-orleans">Sala New Orleans</option>
                <option value="savoy">Sala Savoy</option>
              </select>
            </div>

            <div class="form-grupo">
              <label for="profesor-clase">Profesor/a*</label>
              <input
                type="text"
                id="profesor-clase"
                name="profesor-clase"
                placeholder="Nombre del profesor/a"
              />
            </div>

            <div class="form-grupo">
              <label for="nivel-clase">Nivel*</label>
              <select id="nivel-clase" name="nivel-clase">
                <option value="basico">Basico</option>
                <option value="intermedio">Intermedio</option>
                <option value="avanzado">Avanzado</option>
              </select>
            </div>
          </div>

          <!-- ── Campos exclusivos de ACTIVIDAD ──
               Oculto por defecto. main.js lo muestra al cambiar al tab ACTIVIDAD. -->
          <div id="campos-actividad" class="campos-tipo oculto">
            <div class="form-grupo">
              <label for="tipo-actividad">Tipo*</label>
              <select id="tipo-actividad" name="tipo-actividad">
                <option value="taster">Taster</option>
                <option value="social">Social</option>
                <option value="concierto">Concierto</option>
                <option value="mix-match">Mix &amp; Match</option>
              </select>
            </div>

            <div class="form-grupo">
              <label for="ubicacion-actividad">Ubicacion*</label>
              <select id="ubicacion-actividad" name="ubicacion-actividad">
                <option value="be-hopper">Sala Be Hopper</option>
                <option value="new-orleans">Sala New Orleans</option>
                <option value="savoy">Sala Savoy</option>
                <option value="antiguo-casino">Antiguo Casino</option>
                <option value="parque-de-gasset">Parque de Gasset</option>
                <option value="prado">Prado</option>
              </select>
            </div>

            <div class="form-grupo">
              <label for="banda-actividad"
                >Banda <span class="label-opcional">(opcional)</span></label
              >
              <input
                type="text"
                id="banda-actividad"
                name="banda-actividad"
                placeholder="Nombre de la banda"
              />
            </div>

            <div class="form-grupo">
              <label for="profesor-actividad"
                >Profesor/a
                <span class="label-opcional">(opcional)</span></label
              >
              <input
                type="text"
                id="profesor-actividad"
                name="profesor-actividad"
                placeholder="Nombre del profesor/a"
              />
            </div>

            <div class="form-grupo">
              <label for="descripcion-actividad"
                >Descripcion
                <span class="label-opcional">(opcional)</span></label
              >
              <textarea
                id="descripcion-actividad"
                name="descripcion-actividad"
                rows="4"
                placeholder="Informacion adicional..."
              ></textarea>
            </div>
          </div>

          <!-- Parrafo donde main.js escribe los mensajes de error de validacion. -->
          <p id="mensaje-error" class="form-error oculto"></p>

          <!-- main.js cambia el texto de este boton a "GUARDAR CAMBIOS" en modo edicion -->
          <button type="submit" class="btn-submit">AÑADIR EVENTO</button>
        </form>
      </section>
    </main>

    <!-- El footer se rellena dinamicamente por headerFooter.js -->
    <footer></footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
